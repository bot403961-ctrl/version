<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taker SMS - Live Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --surface: rgba(255,255,255,0.03);
            --glass: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
            --accent: #6366f1;
            --accent2: #818cf8;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.05) 0%, transparent 50%);
        }
        
        /* Glass Morphism */
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); }
        
        /* Header */
        .header {
            background: rgba(15,15,30,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .badge {
            background: var(--accent);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* Container */
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        /* Stats Row */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; transition: all 0.3s; }
        .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .stat-value { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'JetBrains Mono', monospace; }
        .stat-label { color: var(--text2); font-size: 13px; margin-top: 5px; }
        
        /* Console Feed */
        .console-feed { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .console-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .console-title { font-weight: 600; font-size: 16px; }
        .console-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
        
        .console-body { max-height: 65vh; overflow-y: auto; padding: 10px; }
        .console-body::-webkit-scrollbar { width: 4px; }
        .console-body::-webkit-scrollbar-track { background: transparent; }
        .console-body::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        .feed-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px;
            margin: 6px 0;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .feed-item:hover { border-color: var(--border); background: rgba(255,255,255,0.04); }
        
        .app-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .app-wa { background: rgba(37,211,102,0.15); }
        .app-fb { background: rgba(24,119,242,0.15); }
        .app-ig { background: rgba(225,48,108,0.15); }
        .app-tg { background: rgba(0,136,204,0.15); }
        .app-tt { background: rgba(0,0,0,0.3); }
        .app-ms { background: rgba(0,120,212,0.15); }
        .app-nf { background: rgba(229,9,20,0.15); }
        .app-gp { background: rgba(66,133,244,0.15); }
        
        .feed-content { flex: 1; min-width: 0; }
        .feed-range {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent2);
            background: rgba(99,102,241,0.1);
            padding: 3px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .feed-message { font-size: 14px; color: var(--text); line-height: 1.5; word-break: break-word; }
        .feed-meta { display: flex; gap: 12px; align-items: center; margin-top: 6px; }
        .feed-app {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 600;
        }
        .feed-time { font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
        
        /* Bottom Nav */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15,15,30,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 8px 16px;
            z-index: 100;
        }
        .bottom-nav-inner { display: flex; justify-content: space-around; }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text2);
            text-decoration: none;
            font-size: 11px;
            padding: 8px;
            transition: all 0.3s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 22px; height: 22px; }
        
        @media (max-width: 768px) {
            .bottom-nav { display: block; }
            .container { padding: 15px 15px 80px 15px; }
            .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-card { padding: 14px; }
            .stat-value { font-size: 22px; }
            .stat-label { font-size: 10px; }
            .header { padding: 12px 16px; }
            .logo { font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">⚡ Taker SMS</div>
        <div class="header-actions">
            <span class="badge" id="liveBadge">🟢 LIVE</span>
        </div>
    </div>

    <div class="container">
        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="totalMsgs">0</div>
                <div class="stat-label">📱 رسائل اليوم</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeServices">0</div>
                <div class="stat-label">🛠 خدمات نشطة</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeCountries">0</div>
                <div class="stat-label">🌍 دول</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="topApp">-</div>
                <div class="stat-label">🔥 الأكثر استخداماً</div>
            </div>
        </div>

        <!-- Console Feed -->
        <div class="console-feed glass">
            <div class="console-header">
                <span><span class="console-dot"></span>Live Console</span>
                <span style="font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;" id="clock">--:--:--</span>
            </div>
            <div class="console-body" id="feed">
                <div style="text-align:center;padding:40px;color:var(--text2);">
                    ⏳ انتظار البيانات...
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Nav Mobile -->
    <div class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="index.html" class="nav-item">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M6.5 10c-.223 0-.437.034-.65.065.069-.232.14-.468.254-.68.114-.308.292-.575.469-.844.148-.291.409-.488.601-.737.201-.242.475-.403.692-.604.213-.21.492-.315.714-.463.232-.133.434-.28.65-.35.2-.08.403-.093.584-.09.182 0 .361.03.535.074.177.04.355.082.526.151.17.064.335.155.491.257.17.093.362.152.54.169.18.02.377-.032.535-.017.16.015.324.088.479.14.155.06.303.136.446.218.148.076.277.18.407.28.26.21.472.47.662.729.186.258.328.551.427.856.096.306.125.624.119.938-.006.313-.092.619-.229.898-.136.277-.332.525-.572.749-.242.222-.537.399-.844.526-.308.128-.635.19-.961.186-.325-.001-.646-.064-.961-.168-.309-.11-.596-.288-.882-.466-.283-.183-.549-.4-.794-.643-.247-.245-.472-.515-.67-.805-.196-.295-.355-.61-.49-.932-.137-.32-.246-.65-.346-.982-.1-.334-.185-.672-.242-1.013L6.5 10z"/></svg>
                طلب رقم
            </a>
            <a href="console.html" class="nav-item active">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M20 3H4c-1.103 0-2 .897-2 2v14c0 1.103.897 2 2 2h16c1.103 0 2-.897 2-2V5c0-1.103-.897-2-2-2zM4 19V7h16l.002 12H4z"/><path d="M6 10h6v2H6zm0 4h12v2H6z"/></svg>
                Console
            </a>
            <a href="otp.html" class="nav-item">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.103 0-2 .897-2 2v12c0 1.103.897 2 2 2h4v3l4-3h8c1.103 0 2-.897 2-2V4c0-1.103-.897-2-2-2zm0 14H4V4h16v12z"/></svg>
                الأكواد
            </a>
        </div>
    </div>

    <script>
        const API_URL = "https://api.2oo9.cloud/MXS47FLFX0U/tness/@public/api";
        const API_KEY = "MDP0C6NEHVI";

        function detectApp(msg) {
            const m = msg.toLowerCase();
            if (m.includes('whatsapp')) return { name: 'WhatsApp', icon: '💬', cls: 'app-wa' };
            if (m.includes('facebook') || m.includes('fb-')) return { name: 'Facebook', icon: '📘', cls: 'app-fb' };
            if (m.includes('instagram')) return { name: 'Instagram', icon: '📷', cls: 'app-ig' };
            if (m.includes('telegram')) return { name: 'Telegram', icon: '✈️', cls: 'app-tg' };
            if (m.includes('tiktok')) return { name: 'TikTok', icon: '🎵', cls: 'app-tt' };
            if (m.includes('microsoft')) return { name: 'Microsoft', icon: '💻', cls: 'app-ms' };
            if (m.includes('netflix')) return { name: 'Netflix', icon: '🎬', cls: 'app-nf' };
            if (m.includes('google') || m.includes('gmail')) return { name: 'Google', icon: '🔍', cls: 'app-gp' };
            if (m.includes('discord')) return { name: 'Discord', icon: '🎮', cls: 'app-ms' };
            return { name: 'OTP', icon: '🔐', cls: 'app-ms' };
        }

        function timeAgo(ms) {
            const seconds = Math.floor((Date.now() - ms) / 1000);
            if (seconds < 60) return seconds + 's ago';
            if (seconds < 3600) return Math.floor(seconds/60) + 'm ago';
            return Math.floor(seconds/3600) + 'h ago';
        }

        async function loadConsole() {
            try {
                const [consoleResp, liveResp] = await Promise.all([
                    fetch(`${API_URL}/console`, { headers: { 'mauthapi': API_KEY } }),
                    fetch(`${API_URL}/liveaccess`, { headers: { 'mauthapi': API_KEY } })
                ]);
                
                const consoleData = await consoleResp.json();
                const liveData = await liveResp.json();
                
                // Stats
                const successes = consoleData?.data?.successes || [];
                const liveServices = liveData?.data?.services || [];
                
                document.getElementById('totalMsgs').textContent = successes.length;
                document.getElementById('activeServices').textContent = liveServices.length;
                
                const countries = new Set(successes.map(s => {
                    const rng = (s.range || '').replace('XXX', '');
                    return rng.substring(0, 3);
                }));
                document.getElementById('activeCountries').textContent = countries.size;
                
                // Top app
                const apps = {};
                successes.forEach(s => {
                    const app = detectApp(s.message || '');
                    apps[app.name] = (apps[app.name] || 0) + 1;
                });
                const topApp = Object.entries(apps).sort((a,b) => b[1]-a[1])[0];
                document.getElementById('topApp').textContent = topApp ? topApp[0] : '-';
                
                // Feed
                let html = '';
                successes.slice(0, 40).forEach(item => {
                    const rng = (item.range || '???').replace('XXX', '');
                    const app = detectApp(item.message || '');
                    const time = timeAgo(item.time || Date.now());
                    
                    html += `
                    <div class="feed-item">
                        <div class="app-icon ${app.cls}">${app.icon}</div>
                        <div class="feed-content">
                            <span class="feed-range">${rng}</span>
                            <div class="feed-message">${(item.message || '').substring(0, 120)}</div>
                            <div class="feed-meta">
                                <span class="feed-app">${app.icon} ${app.name}</span>
                                <span class="feed-time">${time}</span>
                            </div>
                        </div>
                    </div>`;
                });
                
                document.getElementById('feed').innerHTML = html || '<div style="text-align:center;padding:40px;color:var(--text2);">لا توجد رسائل حالياً</div>';
                
                // Clock
                document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
                
            } catch (e) {
                console.error(e);
            }
        }

        loadConsole();
        setInterval(loadConsole, 5000);
    </script>
</body>
</html>

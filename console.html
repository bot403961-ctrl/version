<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKER SMS - Console</title>
    <style>
        :root {
            --bg: #0a0a1a; --card: #13132b; --purple: #6366f1;
            --text: #e2e8f0; --text2: #94a3b8; --border: #1e1e3a;
            --green: #4ade80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--purple), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .log-entry { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; }
        .badge-wa { background: #25D36633; color: #25D366; }
        .badge-ig { background: #E4405F33; color: #E4405F; }
        .badge-fb { background: #1877F233; color: #1877F2; }
        .badge-tg { background: #26A5E433; color: #26A5E4; }
        .badge-go { background: #4285F433; color: #4285F4; }
        .badge-tt { background: #FF005033; color: #FF0050; }
        .badge-ms { background: #00A4EF33; color: #00A4EF; }
        .badge-nf { background: #E5091433; color: #E50914; }
        .tag { color: var(--purple); font-weight: 600; }
        .time { color: var(--text2); font-size: 11px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { color: var(--text2); text-decoration: none; font-size: 11px; text-align: center; font-family: 'Plus Jakarta Sans', sans-serif; }
        .nav-item.active { color: var(--purple); }
        .nav-item span { display: block; font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TAKER SMS</div>
        <a href="/dashboard" style="color:var(--purple);text-decoration:none;font-family:'Plus Jakarta Sans',sans-serif;">← Back</a>
    </div>

    <div class="container">
        <h3 style="margin-bottom:15px;font-family:'Plus Jakarta Sans',sans-serif;">🖥️ Live Console</h3>
        <div id="logs">Loading...</div>
    </div>

    <div class="bottom-nav">
        <a href="/dashboard" class="nav-item"><span>📊</span>Dashboard</a>
        <a href="/numbers" class="nav-item"><span>📱</span>Numbers</a>
        <a href="/wallet" class="nav-item"><span>💰</span>Wallet</a>
        <a href="/console" class="nav-item active"><span>🖥️</span>Console</a>
    </div>

    <script>
        function getBadgeClass(app) {
            const map = {
                'WhatsApp': 'badge-wa', 'Instagram': 'badge-ig', 'Facebook': 'badge-fb',
                'Telegram': 'badge-tg', 'Google': 'badge-go', 'TikTok': 'badge-tt',
                'Microsoft': 'badge-ms', 'Netflix': 'badge-nf'
            };
            return map[app] || 'badge-go';
        }

        async function loadLogs() {
            const res = await fetch('/api/console/logs');
            const data = await res.json();
            
            document.getElementById('logs').innerHTML = data.logs.length ?
                data.logs.map(l => `
                    <div class="log-entry">
                        <div>
                            <span class="tag">[${l.prefix}]</span>
                            ${l.message}
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span class="badge ${getBadgeClass(l.app_name)}">${l.app_name}</span>
                            <span class="time">${new Date(l.created_at).toLocaleTimeString()}</span>
                        </div>
                    </div>
                `).join('') : '<div style="text-align:center;color:var(--text2);">Waiting for OTP hits...</div>';
        }

        loadLogs();
        setInterval(loadLogs, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKER SMS - Wallet</title>
    <style>
        :root {
            --bg: #0a0a1a; --card: #13132b; --purple: #6366f1;
            --text: #e2e8f0; --text2: #94a3b8; --border: #1e1e3a;
            --green: #4ade80; --red: #f87171; --input: #0d0d22;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--purple), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .balance-card { background: linear-gradient(135deg, var(--purple), #818cf8); border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 25px; }
        .balance-amount { font-size: 42px; font-weight: 800; }
        .balance-label { font-size: 13px; opacity: 0.8; margin-top: 5px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .card h3 { margin-bottom: 15px; font-size: 16px; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        input, select { width: 100%; padding: 12px; background: var(--input); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; margin-bottom: 12px; }
        .btn { width: 100%; padding: 12px; background: var(--purple); border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; font-size: 15px; }
        .api-key { font-family: 'JetBrains Mono', monospace; background: var(--input); padding: 10px; border-radius: 8px; font-size: 12px; word-break: break-all; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { color: var(--text2); text-decoration: none; font-size: 11px; text-align: center; }
        .nav-item.active { color: var(--purple); }
        .nav-item span { display: block; font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TAKER SMS</div>
        <a href="/dashboard" style="color:var(--purple);text-decoration:none;">← Back</a>
    </div>

    <div class="container">
        <div class="balance-card">
            <div class="balance-label">Current Balance</div>
            <div class="balance-amount" id="balance">$0.00</div>
        </div>

        <div class="card">
            <h3>💰 Earnings Overview</h3>
            <div class="row"><span>Total Earned</span><span id="total-earned">$0.00</span></div>
            <div class="row"><span>Total Withdrawn</span><span id="total-withdrawn">$0.00</span></div>
        </div>

        <div class="card">
            <h3>🔑 API Key</h3>
            <div class="api-key" id="api-key" onclick="copyText(document.getElementById('api-key').textContent)">Loading...</div>
            <div style="font-size:11px;color:var(--text2);margin-top:8px;">Click to copy</div>
        </div>

        <div class="card">
            <h3>💸 Request Payout</h3>
            <input type="number" id="amount" placeholder="Amount ($)" step="0.01" min="1">
            <select id="method">
                <option value="binance">Binance</option>
                <option value="esewa">eSewa</option>
            </select>
            <input type="text" id="account" placeholder="Account ID / Email">
            <button class="btn" onclick="requestPayout()">Request Payout</button>
        </div>

        <div class="card">
            <h3>📋 Transaction History</h3>
            <div id="transactions">Loading...</div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="/dashboard" class="nav-item"><span>📊</span>Dashboard</a>
        <a href="/numbers" class="nav-item"><span>📱</span>Numbers</a>
        <a href="/wallet" class="nav-item active"><span>💰</span>Wallet</a>
        <a href="/console" class="nav-item"><span>🖥️</span>Console</a>
    </div>

    <script>
        async function loadWallet() {
            const res = await fetch('/api/wallet/info');
            const data = await res.json();
            document.getElementById('balance').textContent = '$' + data.balance.toFixed(2);
            document.getElementById('total-earned').textContent = '$' + data.total_earned.toFixed(2);
            document.getElementById('total-withdrawn').textContent = '$' + data.total_withdrawn.toFixed(2);
            document.getElementById('api-key').textContent = data.api_key;
            
            const txRes = await fetch('/api/wallet/transactions');
            const txData = await txRes.json();
            document.getElementById('transactions').innerHTML = txData.transactions.length ? 
                txData.transactions.map(t => `
                    <div class="row">
                        <span>${t.type.toUpperCase()}</span>
                        <span>$${t.amount.toFixed(2)}</span>
                        <span style="font-size:11px;color:var(--text2);">${t.status} · ${t.created_at}</span>
                    </div>
                `).join('') : '<div style="color:var(--text2);text-align:center;">No transactions yet</div>';
        }

        async function requestPayout() {
            const amount = document.getElementById('amount').value;
            const method = document.getElementById('method').value;
            const account = document.getElementById('account').value;
            
            const res = await fetch('/api/wallet/payout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({amount: parseFloat(amount), method, account})
            });
            
            const data = await res.json();
            if (data.success) {
                alert('Payout requested!');
                loadWallet();
            } else {
                alert(data.error);
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert('API Key copied!');
        }

        loadWallet();
    </script>
</body>
</html>

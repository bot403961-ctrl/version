<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKER SMS - Numbers</title>
    <style>
        :root {
            --bg: #0a0a1a; --card: #13132b; --purple: #6366f1;
            --text: #e2e8f0; --text2: #94a3b8; --border: #1e1e3a;
            --green: #4ade80; --red: #f87171; --input: #0d0d22;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--purple), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, select { padding: 12px; background: var(--input); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; flex: 1; min-width: 120px; }
        .btn { padding: 12px 24px; background: var(--purple); border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; }
        .number-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .number-info { flex: 1; }
        .number { font-size: 18px; font-weight: 600; cursor: pointer; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-left: 8px; }
        .badge-web { background: #1e3a5f; color: #60a5fa; }
        .badge-api { background: #1e3a2f; color: #4ade80; }
        .badge-app { background: #3a1e5f; color: #a78bfa; }
        .otp-code { font-size: 22px; font-weight: 700; color: var(--green); margin-top: 5px; cursor: pointer; }
        .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--text2); border-top-color: var(--purple); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { color: var(--text2); text-decoration: none; font-size: 11px; text-align: center; }
        .nav-item.active { color: var(--purple); }
        .nav-item span { display: block; font-size: 20px; margin-bottom: 2px; }
        .delete-btn { background: var(--red); border: none; padding: 8px 14px; border-radius: 8px; color: white; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TAKER SMS</div>
        <a href="/dashboard" style="color:var(--purple);text-decoration:none;">← Back</a>
    </div>

    <div class="container">
        <div class="form-row">
            <input type="text" id="prefix" placeholder="Prefix (e.g. 26134)" value="26134">
            <input type="number" id="quantity" placeholder="Qty" value="1" min="1" max="10">
            <button class="btn" onclick="generateNumbers()">Get Numbers</button>
            <button class="btn" style="background:var(--red);" onclick="clearAll()">Clear All</button>
        </div>

        <div id="numbers-list"></div>
    </div>

    <div class="bottom-nav">
        <a href="/dashboard" class="nav-item"><span>📊</span>Dashboard</a>
        <a href="/numbers" class="nav-item active"><span>📱</span>Numbers</a>
        <a href="/wallet" class="nav-item"><span>💰</span>Wallet</a>
        <a href="/console" class="nav-item"><span>🖥️</span>Console</a>
    </div>

    <script>
        async function generateNumbers() {
            const prefix = document.getElementById('prefix').value;
            const quantity = document.getElementById('quantity').value;
            
            const res = await fetch('/api/numbers/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prefix, quantity: parseInt(quantity)})
            });
            
            const data = await res.json();
            if (data.success) {
                loadNumbers();
                
                // Auto-generate OTP after 10 seconds for each number
                data.numbers.forEach(num => {
                    setTimeout(async () => {
                        const numRes = await fetch('/api/numbers/list');
                        const numData = await numRes.json();
                        const numberObj = numData.numbers.find(n => n.number === num);
                        if (numberObj) {
                            await fetch('/api/numbers/generate-otp', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    number_id: numberObj.id,
                                    number: num,
                                    prefix: prefix
                                })
                            });
                            loadNumbers();
                        }
                    }, 10000);
                });
            }
        }

        async function loadNumbers() {
            const res = await fetch('/api/numbers/list');
            const data = await res.json();
            
            const list = document.getElementById('numbers-list');
            list.innerHTML = data.numbers.map(n => `
                <div class="number-card">
                    <div class="number-info">
                        <div>
                            <span class="number" onclick="copyText('${n.number}')">+${n.number}</span>
                            <span class="badge ${n.source === 'web' ? 'badge-web' : 'badge-api'}">${n.source.toUpperCase()}</span>
                            ${n.app_name ? `<span class="badge badge-app">${n.app_name}</span>` : ''}
                        </div>
                        <div style="font-size:12px;color:var(--text2);margin-top:4px;">
                            ${n.country || 'Madagascar'} · ${new Date(n.created_at).toLocaleTimeString()}
                        </div>
                        ${n.status === 'success' ? `
                            <div class="otp-code" onclick="copyText('${n.otp_code}')">🔑 ${n.otp_code}</div>
                            <div style="font-size:11px;color:var(--text2);margin-top:4px;">${n.otp_message}</div>
                        ` : `
                            <div style="margin-top:5px;color:var(--text2);">
                                <span class="loader"></span> Awaiting OTP payload...
                            </div>
                        `}
                    </div>
                    <button class="delete-btn" onclick="deleteNumber(${n.id})">✕</button>
                </div>
            `).join('');
        }

        async function deleteNumber(id) {
            await fetch('/api/numbers/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({number_id: id})
            });
            loadNumbers();
        }

        async function clearAll() {
            if (confirm('Clear all numbers?')) {
                await fetch('/api/numbers/clear', {method:'POST'});
                loadNumbers();
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert('Copied: ' + text);
        }

        loadNumbers();
        setInterval(loadNumbers, 10000);
    </script>
</body>
</html>
